<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="120" fill="url(#shadow)"/>

  <!-- Printer body -->
  <g fill="white">
    <!-- Paper output tray (top) -->
    <rect x="80" y="68" width="96" height="40" rx="4" ry="4"/>

    <!-- Main printer body -->
    <rect x="56" y="100" width="144" height="64" rx="8" ry="8"/>

    <!-- Paper input tray (bottom) -->
    <rect x="80" y="156" width="96" height="36" rx="4" ry="4"/>
  </g>

  <!-- Printer details (cut-outs and accents) -->
  <g fill="#4F46E5" opacity="0.3">
    <!-- Paper sheet visible on top -->
    <rect x="92" y="74" width="72" height="28" rx="2" ry="2"/>

    <!-- Paper slot -->
    <rect x="68" y="126" width="120" height="4" rx="2" ry="2"/>

    <!-- Output paper visible on bottom -->
    <rect x="92" y="162" width="72" height="24" rx="2" ry="2"/>
  </g>

  <!-- Power indicator LED -->
  <circle cx="172" cy="114" r="5" fill="#34D399"/>

  <!-- Subtle text lines on paper -->
  <g stroke="#4F46E5" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="82" x2="148" y2="82"/>
    <line x1="100" y1="88" x2="136" y2="88"/>
    <line x1="100" y1="170" x2="148" y2="170"/>
    <line x1="100" y1="176" x2="140" y2="176"/>
    <line x1="100" y1="182" x2="130" y2="182"/>
  </g>
</svg>
