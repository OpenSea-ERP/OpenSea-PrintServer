<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" rx="3" ry="3" fill="url(#bg)"/>

  <!-- Simplified printer icon -->
  <g fill="white">
    <!-- Paper top -->
    <rect x="4.5" y="3" width="7" height="3" rx="0.5"/>
    <!-- Body -->
    <rect x="3" y="5.5" width="10" height="5" rx="1"/>
    <!-- Paper bottom -->
    <rect x="4.5" y="10" width="7" height="3" rx="0.5"/>
  </g>

  <!-- Paper slot line -->
  <line x1="4" y1="8.5" x2="12" y2="8.5" stroke="#4F46E5" stroke-opacity="0.3" stroke-width="0.5"/>
</svg>
