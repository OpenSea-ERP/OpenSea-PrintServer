name: Build (multi-OS smoke)

# Multi-OS build verification. NOT responsável por release oficial —
# release.yml é quem publica no OpenSea-PrintServer-Releases via
# electron-builder com codesign Authenticode (Milestone v3.0 / SAT-RELEASE-01..03).

on:
  pull_request:
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-windows-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Electron (Windows NSIS x64)
        run: npx electron-builder --win --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            release/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-macos-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Electron (macOS DMG x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            release/*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-linux-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Electron (Linux AppImage x64)
        run: npx electron-builder --linux --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            release/*.AppImage
          if-no-files-found: error

  # Release job removida em 2026-04-30 (Milestone v3.0 / SAT-RELEASE-01..03).
  # Releases agora são publicadas pelo .github/workflows/release.yml
  # diretamente no repo público OpenSea-PrintServer-Releases via
  # electron-builder com codesign Authenticode obrigatório.
