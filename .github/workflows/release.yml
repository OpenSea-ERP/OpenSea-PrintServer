name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Disable autocrlf
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-

      - name: Install
        run: npm ci

      - name: Build (renderer + main)
        run: npm run build

      - name: Build & publish to GitHub Releases
        env:
          # Releases vão para o repo PÚBLICO OpenSea-PrintServer-Releases.
          # `secrets.GITHUB_TOKEN` só dá permissão no repo atual (privado),
          # então usamos um PAT dedicado com escopo no repo de releases.
          # Mesmo padrão do OpenSea-Horus — Milestone v3.0 / Satellite Contract v1.
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
          # Code signing Authenticode (SAT-RELEASE-03 + SAT-CI-01-rev2).
          # OPCIONAL: quando os secrets estão presentes, o build assina e o
          # sentinel abaixo valida. Quando ausentes, o build sai unsigned e o
          # sentinel é PULADO. Política decidida em SAT-CI-01-rev2 — cert
          # Authenticode tem renovação anual + custo, fica opcional.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --x64 --publish always

      - name: Verify Authenticode signature (sentinel — SAT-CI-01-rev2)
        # OPCIONAL: só roda quando WIN_CSC_LINK está configurado. Quando o
        # secret estiver presente, falha o release se o binário não estiver
        # assinado (proteção anti-acidente). Quando ausente, o release segue
        # unsigned — política SAT-CI-01-rev2 (cert Authenticode é opcional).
        if: ${{ secrets.WIN_CSC_LINK != '' }}
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem release -Filter "OpenSea-PrintServer-Setup-*.exe" -ErrorAction SilentlyContinue

          if (-not $exeFiles) {
            Write-Error "No installer files found in release/ directory"
            exit 1
          }

          $allValid = $true
          foreach ($file in $exeFiles) {
            $sig = Get-AuthenticodeSignature $file.FullName
            Write-Host "[$($file.Name)] Signature status: $($sig.Status)"
            if ($sig.Status -ne 'Valid') {
              Write-Error "[$($file.Name)] Signature invalid or missing: $($sig.StatusMessage)"
              $allValid = $false
            }
          }

          if (-not $allValid) {
            Write-Error "One or more installers failed Authenticode verification. Release aborted."
            exit 1
          }

          Write-Host "All installers passed Authenticode signature verification."

      # electron-builder cria a release como draft por design.
      # Promovemos para "Latest" automaticamente para que electron-updater
      # consiga encontrá-la (releases draft não são visíveis pro updater).
      - name: Promote release from draft to latest
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: gh release edit ${{ github.ref_name }} --repo OpenSea-ERP/OpenSea-PrintServer-Releases --draft=false --latest

      - name: Upload installer as workflow artifact (backup)
        uses: actions/upload-artifact@v5
        with:
          name: printserver-${{ github.ref_name }}-win-x64
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 90
